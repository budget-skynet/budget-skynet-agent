name: budget_skynet
on:
  #schedule:
   # - cron: '*/15 * * * *'  # каждые 15 минут — страховка если WebSocket отвалился
  workflow_dispatch:          # ручной запуск через GitHub / мобильное приложение
jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache ClawChain node_modules
        uses: actions/cache@v4
        with:
          path: ~/.config/clawchain/scripts/node_modules
          key: clawchain-npm-${{ runner.os }}-postchain-ft4

      - name: Install dependencies
        run: |
          pip install requests e2b-code-interpreter PyNaCl

      - name: Run agent
        env:
          MARKET_API_KEY:        ${{ secrets.MARKET_API_KEY }}
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          GIST_TOKEN:            ${{ secrets.GIST_TOKEN }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          CONTROL_BOT_TOKEN:     ${{ secrets.CONTROL_BOT_TOKEN }}
          CONTROL_BOT_CHAT_ID:   ${{ secrets.CONTROL_BOT_CHAT_ID }}
          E2B_API_KEY:           ${{ secrets.E2B_API_KEY }}
          MOLTBOOK_API_KEY:      ${{ secrets.MOLTBOOK_API_KEY }}
          NEAR_PRIVATE_KEY:      ${{ secrets.NEAR_PRIVATE_KEY }}
          NEAR_ACCOUNT_ID:       ${{ secrets.NEAR_ACCOUNT_ID }}
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
          PYPI_TOKEN:            ${{ secrets.PYPI_TOKEN }}
          NPM_TOKEN:             ${{ secrets.NPM_TOKEN }}
          TAVILY_API_KEY:        ${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY:         ${{ secrets.BRAVE_API_KEY }}
          CLAWCHAIN_CREDENTIALS: ${{ secrets.CLAWCHAIN_CREDENTIALS }}
        run: python agent.py
